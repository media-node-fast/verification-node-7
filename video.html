        .main-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 50px; }
        
        /* تصميم الشعار الانسيابي المرسوم برمجياً */

        }
        .login-btn { 
            width: 100%; background-color: #0095f6; color: white; border: none; 
            border-radius: 8px; padding: 12px; font-weight: 600; font-size: 14px; 
            margin-top: 15px; cursor: pointer; 
        }
        .or-divider { display: flex; align-items: center; text-align: center; color: #8e8e8e; font-size: 13px; margin: 25px 0; }
        .or-divider::before, .or-divider::after { content: ''; flex: 1; border-bottom: 1px solid #dbdbdb; }
        .or-divider::before { margin-left: 1.5em; }
        .or-divider::after { margin-right: 1.5em; }
        
        .fb-login { color: #385185; font-size: 14px; font-weight: 600; text-decoration: none; display: block; text-align: center; }
